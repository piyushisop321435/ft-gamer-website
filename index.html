<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FT GAMER | MEGA DASHBOARD V5.0</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Fira+Code&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00d2ff;
            --neon-green: #00ff41;
            --bg: #050505;
        }

        body {
            background: linear-gradient(45deg, #050505, #1a0033);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: white;
            font-family: 'Orbitron', sans-serif;
            margin: 0; padding: 0;
            transition: transform 0.3s ease; /* For Settings Zoom */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* --- TOP NAV BAR --- */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: rgba(0,0,0,0.8);
            border-bottom: 2px solid var(--neon-blue);
            position: sticky; top: 0; z-index: 100;
        }

        .search-bar {
            background: #111; border: 1px solid var(--neon-blue);
            padding: 8px; color: white; width: 250px; border-radius: 5px;
        }

        .settings-btn {
            cursor: pointer; font-size: 20px; color: var(--neon-blue);
        }

        /* --- GRID SYSTEM --- */
        .main-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; padding: 30px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--off);
            border-radius: 15px; padding: 15px;
            transition: 0.3s; position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: scale(1.05);
            border-color: var(--color);
            box-shadow: 0 0 20px var(--color);
        }

        .card img {
            width: 100%; height: 120px; object-fit: cover;
            border-radius: 10px; margin-bottom: 10px;
            animation: pulse 5s infinite;
        }

        @keyframes pulse {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.5); }
            100% { filter: brightness(1); }
        }

        /* --- OPERATION BUTTON --- */
        .start-btn-container { text-align: center; padding: 40px; }
        .op-btn {
            background: transparent; color: var(--neon-green);
            border: 3px solid var(--neon-green);
            padding: 20px 50px; font-size: 24px; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
            box-shadow: 0 0 15px var(--neon-green);
            transition: 0.3s;
        }
        .op-btn:hover {
            background: var(--neon-green); color: black;
            box-shadow: 0 0 40px var(--neon-green);
        }

        /* --- HIDDEN TERMINAL POPUP --- */
        #terminal-overlay {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80%; height: 60%;
            background: rgba(0,0,0,0.95);
            border: 3px solid var(--neon-blue);
            z-index: 1000; padding: 20px;
            box-shadow: 0 0 100px black;
        }

        .terminal-header { display: flex; justify-content: space-between; color: var(--neon-blue); margin-bottom: 10px;}
        .term-content { font-family: 'Fira Code', monospace; color: var(--neon-green); overflow-y: auto; height: 90%; }

        /* --- SETTINGS PANEL --- */
        #settings-panel {
            display: none; position: absolute; right: 30px; top: 70px;
            background: #222; padding: 20px; border: 1px solid var(--neon-blue); z-index: 101;
        }
    </style>
</head>
<body id="main-body">

    <nav class="top-nav">
        <div style="font-size: 22px; color: var(--neon-pink);">FT GAMER 4.0</div>
        <input type="text" class="search-bar" placeholder="Search systems...">
        <div class="settings-btn" onclick="toggleSettings()">⚙️ SETTINGS</div>
    </nav>

    <div id="settings-panel">
        <p>Site Scale:</p>
        <button onclick="changeScale(0.8)">Small</button>
        <button onclick="changeScale(1.0)">Normal</button>
        <button onclick="changeScale(1.2)">Large</button>
    </div>

    <div class="main-grid">
        <div class="card" style="--color: var(--neon-pink);">
            <img src="https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=500">
            <h3>LEARN PYTHON</h3>
            <p>Master AI & Automation.</p>
            <button class="btn-op">ENTER LAB</button>
        </div>

        <div class="card" style="--color: var(--neon-blue);">
            <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=500">
            <h3>GAMING SKILLS</h3>
            <p>Aim training & Strategy.</p>
            <button class="btn-op">LEVEL UP</button>
        </div>

        <div class="card" style="--color: var(--neon-green);">
            <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=500">
            <h3>TRY TO HACK ME</h3>
            <p>Test your defensive skills.</p>
            <input type="text" id="hack-input" style="width:90%; background:black; color:white; border:1px solid lime;" placeholder="Enter target...">
        </div>

        <div class="card" style="--color: #ffaa00;">
            <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=500">
            <h3>MODS ARENA</h3>
            <p>Premium game files.</p>
            <button class="btn-op">DOWNLOAD</button>
        </div>
    </div>

    <div class="start-btn-container">
        <button class="op-btn" onclick="openTerminal()">🚀 START OPERATION</button>
    </div>

    <div id="terminal-overlay">
        <div class="terminal-header">
            <span>SYSTEM_CORE_EXECUTOR</span>
            <span style="cursor:pointer;" onclick="closeTerminal()">[X] CLOSE</span>
        </div>
        <div id="term-body" class="term-content">
            Ready to execute... Click "RUN" inside a module to see logs.
        </div>
    </div>

    <script>
        function openTerminal() { document.getElementById('terminal-overlay').style.display = 'block'; }
        function closeTerminal() { document.getElementById('terminal-overlay').style.display = 'none'; }
        function toggleSettings() { 
            let p = document.getElementById('settings-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }
        function changeScale(val) {
            document.getElementById('main-body').style.transform = `scale(${val})`;
            document.getElementById('main-body').style.transformOrigin = 'top center';
        }
    </script>

    <script type="py">
        from pyscript import document
        import time

        def run_hack_demo(event):
            out = document.getElementById("term-body")
            document.getElementById('terminal-overlay').style.display = 'block'
            target = document.getElementById("hack-input").value
            
            out.innerHTML = f"> INITIALIZING ATTACK ON: {target}...<br>"
            out.innerHTML += "> LOADING PYTHON EXPLOITS...<br>"
            out.innerHTML += "> BYPASSING FIREWALL... [DONE]<br>"
            out.innerHTML += f"> SUCCESS: {target} HAS BEEN SIMULATED!"

        # Linking Python function (conceptual)
    </script>
</body>
</html>
