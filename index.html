<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>fdmr Piyush | Cyber & Gaming Hub</title>
    <style>
        /* CSS Styling - Dark Cyberpunk/Gamer Theme */
        :root {
            --bg-color: #0d1117; /* GitHub Dark Mode style background */
            --accent-green: #00ff41; /* Hacker Green */
            --accent-blue: #00e5ff; /* Gamer Cyan */
            --text-main: #c9d1d9;
            --panel-bg: #161b22;
        }

        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        /* Top Navigation Bar */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--panel-bg);
            padding: 15px 30px;
            border-bottom: 2px solid var(--accent-green);
            box-shadow: 0 4px 10px rgba(0, 255, 65, 0.1);
        }

        .brand {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent-green);
            text-shadow: 0 0 5px var(--accent-green);
        }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Search Bar */
        .search-bar {
            padding: 8px 15px;
            border: 1px solid var(--accent-blue);
            background-color: var(--bg-color);
            color: white;
            border-radius: 4px;
            outline: none;
            font-family: inherit;
        }
        
        .search-bar:focus {
            box-shadow: 0 0 8px var(--accent-blue);
        }

        /* Settings Dropdown */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropbtn {
            background-color: transparent;
            color: var(--text-main);
            padding: 10px 15px;
            font-size: 1rem;
            border: 1px solid var(--text-main);
            cursor: pointer;
            border-radius: 4px;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        .dropbtn:hover {
            color: var(--accent-blue);
            border-color: var(--accent-blue);
            box-shadow: 0 0 8px rgba(0, 229, 255, 0.4);
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: var(--panel-bg);
            min-width: 200px;
            box-shadow: 0px 8px 16px 0px rgba(0,0,0,0.8);
            border: 1px solid var(--accent-blue);
            z-index: 1;
            border-radius: 4px;
            margin-top: 5px;
        }

        .dropdown-content a {
            color: var(--text-main);
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            border-bottom: 1px solid #30363d;
        }

        .dropdown-content a:last-child {
            border-bottom: none;
        }
