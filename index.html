<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FT GAMER | ULTIMATE DASHBOARD</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff41;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--neon);
            font-family: 'Fira Code', monospace;
            overflow-x: hidden;
        }

        /* MATRIX BACKGROUND */
        #matrix-canvas {
            position: fixed; top: 0; left: 0;
            z-index: -1; opacity: 0.15;
        }

        /* GLASS LAYOUT */
        .container {
            max-width: 1200px; margin: 0 auto; padding: 20px;
        }

        header {
            text-align: center; padding: 40px;
            border: 1px solid var(--neon);
            background: var(--glass);
            backdrop-filter: blur(10px);
            margin-bottom: 30px;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--glass);
            border: 1px solid rgba(0, 255, 65, 0.3);
            padding: 20px;
            backdrop-filter: blur(5px);
            transition: 0.3s;
        }

        .card:hover {
            border-color: var(--neon);
            box-shadow: 0 0 15px var(--neon);
        }

        /* TERMINAL STYLE */
        .terminal {
            background: #000;
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            font-size: 0.85rem;
            border: 1px inset #333;
            margin-top: 10px;
        }

        .input-hack {
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 10px;
            width: 100%;
            margin-bottom: 10px;
        }

        button {
            background: var(--neon);
            color: #000;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .status-bar {
            position: fixed; bottom: 0; width: 100%;
            background: var(--neon); color: #000;
            font-size: 12px; padding: 5px 20px;
            display: flex; justify-content: space-between;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="container">
        <header>
            <h1>[ FT-GAMER CENTRAL COMMAND ]</h1>
            <p>Welcome, Agent Piyush. Unauthorized access is strictly logged.</p>
        </header>

        <div class="grid">
            <div class="card">
                <h3>01. PYTHON ENCRYPTION LAB</h3>
                <p>Test data security levels:</p>
                <input type="text" id="target-data" class="input-hack" placeholder="Enter string to encrypt...">
                <button py-click="run_analysis">RUN ANALYSIS</button>
                <div id="py-output" class="terminal">Awaiting input...</div>
            </div>

            <div class="card">
                <h3>02. NETWORK SCANNER</h3>
                <p>Simulate local network penetration:</p>
                <button onclick="startScan()">INITIALIZE SCAN</button>
                <div id="scan-output" class="terminal">Scanner Offline.</div>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <span>USER: PIYUSH_V4.0</span>
        <span>LOCATION: ENCRYPTED</span>
        <span id="clock"></span>
    </div>

    <script>
        // Matrix Effect
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const letters = "01ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0F0";
            ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 50);

        // Network Scanner Simulation
        function startScan() {
            const out = document.getElementById('scan-output');
            out.innerHTML = "> Probing Ports...<br>";
            let ports = [21, 22, 80, 443, 8080];
            ports.forEach((p, i) => {
                setTimeout(() => {
                    out.innerHTML += `> Port ${p}: <span style="color:red">VULNERABLE</span><br>`;
                }, i * 500);
            });
        }

        // Clock
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>

    <script type="py">
        from pyscript import document
        import random

        def run_analysis(event):
            data = document.getElementById("target-data").value
            out = document.getElementById("py-output")
            
            if not data:
                out.innerHTML = "!! ERROR: NO DATA !!"
                return
            
            # Simulated Python Logic
            out.innerHTML = f"Analyzing: {data}...<br>"
            entropy = len(set(data)) / len(data) if len(data) > 0 else 0
            
            out.innerHTML += f"> Entropy Level: {entropy:.2f}<br>"
            out.innerHTML += "> Generating Hash...<br>"
            out.innerHTML += f"> Hash: {hash(data)}<br>"
            out.innerHTML += "<br><span style='color:white'>RESULT: " + ("SECURE" if entropy > 0.5 else "WEAK") + "</span>"
    </script>

</body>
</html>
