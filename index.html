<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FT GAMER | PRO HACKER DASHBOARD</title>
    
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Fira+Code&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-pink: #ff00ff;
            --neon-blue: #00d2ff;
            --neon-green: #00ff41;
            --glass: rgba(0, 0, 0, 0.85);
        }

        body {
            background: #050505;
            color: white;
            font-family: 'Orbitron', sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .top-bar {
            background: black; padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--neon-pink);
        }

        /* --- GAMING ARENA (POKI STYLE) --- */
        .section-title { padding: 20px 40px; color: var(--neon-blue); font-size: 1.5rem; text-transform: uppercase; }
        
        .game-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px; padding: 0 40px 40px;
        }

        .game-card {
            background: #111; border-radius: 12px; overflow: hidden;
            border: 1px solid #333; transition: 0.4s; cursor: pointer;
        }

        .game-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: var(--neon-pink);
            box-shadow: 0 10px 30px rgba(255, 0, 255, 0.3);
        }

        .game-card img { width: 100%; height: 150px; object-fit: cover; transition: 0.5s; }
        .game-card:hover img { filter: contrast(1.2) brightness(1.2); }
        .game-info { padding: 10px; text-align: center; font-size: 0.8rem; background: #1a1a1a; }

        /* --- CODE COMPILER SECTION --- */
        #code-editor-panel {
            display: none; position: fixed; top: 10%; left: 10%; width: 80%; height: 80%;
            background: var(--glass); border: 2px solid var(--neon-blue);
            z-index: 2000; padding: 20px; backdrop-filter: blur(15px);
        }

        #python-input {
            width: 100%; height: 60%; background: #000; color: var(--neon-green);
            font-family: 'Fira Code', monospace; padding: 15px; border: 1px solid #444;
            font-size: 1.1rem; resize: none;
        }

        /* --- ACTION BUTTONS --- */
        .footer-actions {
            display: flex; justify-content: center; gap: 30px; padding: 50px;
            background: linear-gradient(transparent, #110022);
        }

        .btn-main {
            padding: 20px 40px; font-size: 18px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; border-radius: 5px; transition: 0.3s;
        }

        .start-btn { border: 2px solid var(--neon-green); color: var(--neon-green); background: transparent; }
        .start-btn:hover { background: var(--neon-green); color: black; box-shadow: 0 0 30px var(--neon-green); }

        .write-btn { border: 2px solid var(--neon-blue); color: var(--neon-blue); background: transparent; }
        .write-btn:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 30px var(--neon-blue); }

        /* --- LOG TERMINAL --- */
        #log-terminal {
            background: black; color: var(--neon-green); height: 25%;
            margin-top: 10px; padding: 10px; border: 1px solid #333; overflow-y: auto;
            font-family: 'Fira Code', monospace;
        }
    </style>
</head>
<body>

    <nav class="top-bar">
        <div style="font-weight: 900; letter-spacing: 2px; color: var(--neon-pink);">FT GAMER V6.0</div>
        <div style="font-family: monospace; color: #555;">[ AUTH: PIYUSH_DEV ]</div>
    </nav>

    <div class="section-title">Popular Gaming Zone</div>
    <div class="game-grid">
        <div class="game-card">
            <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=400" alt="Warzone">
            <div class="game-info">CYBER WARFARE</div>
        </div>
        <div class="game-card">
            <img src="https://images.unsplash.com/photo-1552820728-8b83bb6b773f?q=80&w=400" alt="Racing">
            <div class="game-info">NITRO DRIFT</div>
        </div>
        <div class="game-card">
            <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?q=80&w=400" alt="Shadow">
            <div class="game-info">SHADOW STRIKE</div>
        </div>
        <div class="game-card">
            <img src="https://images.unsplash.com/photo-1614027164847-1b2809eb189d?q=80&w=400" alt="Minecraft">
            <div class="game-info">PIXEL BUILDER</div>
        </div>
    </div>

    <div class="footer-actions">
        <button class="btn-main start-btn" onclick="openOps()">Start Operation</button>
        <button class="btn-main write-btn" onclick="openCompiler()">Write Code</button>
    </div>

    <div id="code-editor-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <span style="color:var(--neon-blue)">PYTHON INTERPRETER V1.0</span>
            <span style="color:red; cursor:pointer;" onclick="closeCompiler()">[ CLOSE ]</span>
        </div>
        <textarea id="python-input" placeholder="# Write your Python code here...&#10;print('Hello Piyush!')"></textarea>
        <button py-click="execute_user_code" style="width:100%; padding:15px; margin-top:10px; background:var(--neon-green); border:none; cursor:pointer; font-weight:bold;">EXECUTE SCRIPT</button>
        <div id="log-terminal">>> Awaiting Execution...</div>
    </div>

    <script>
        function openCompiler() { document.getElementById('code-editor-panel').style.display = 'block'; }
        function closeCompiler() { document.getElementById('code-editor-panel').style.display = 'none'; }
        function openOps() { alert("Operation Center Initialized. Please use the Code Editor to inject scripts."); }
    </script>

    <script type="py">
        from pyscript import document

        def execute_user_code(event):
            user_code = document.getElementById("python-input").value
            terminal = document.getElementById("log-terminal")
            
            terminal.innerHTML = "> Executing User Script...<br>"
            
            try:
                # DANGER: Running exec() for simulation
                # In a real app we'd use a safer way, but for school project this is OP!
                exec(user_code)
                terminal.innerHTML += "> [SUCCESS] Script finished without errors."
            except Exception as e:
                terminal.innerHTML += f"<span style='color:red'>> [ERROR] {str(e)}</span>"
    </script>

</body>
</html>
